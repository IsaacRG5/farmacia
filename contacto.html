<body>
    <header>
        <div>
            <img src="imaganes/bio.jpeg" alt="Farmacia">
            <h1>BioFarma</h1>
        </div>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Inicio</a>

    </header>
    <section id="contacto">

  <div class="contacto-header">
    <h2>Contáctanos</h2>
    <p class="subtitulo">Estamos aquí para ayudarte</p>
  </div>

  <div class="contacto-grid">

    <!-- FORM -->
    <div class="contacto-form-box">
      <h3>Envíanos un mensaje</h3>

      <form action="#" method="POST">
        <label>Nombre</label>
        <input type="text" name="nombre" required>

        <label>Correo</label>
        <input type="email" name="email" required>

        <label>Mensaje</label>
        <textarea name="mensaje" rows="4" required></textarea>

        <button type="submit">Enviar</button>
      </form>
    </div>

    <!-- MAPA -->
    <div class="contacto-mapa-box">
      <h3>Ubicación</h3>

      <div class="mapa-embed">
        <iframe src="TU_MAPA_AQUI" width="100%" height="200"></iframe>
      </div>

      <div class="info-item">📍 Barranquilla , Colombia</div>
      <div class="info-item">📞 +57 300 2207262</div>
      <div class="info-item">🕐 8:00 am – 9:00 pm</div>
    </div>

  </div>

</section>
    
</body>
</html>
