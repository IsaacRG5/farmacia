    <section id="contacto">

  <div class="contacto-header">
    <h2>Contáctanos</h2>
    <p class="subtitulo">Estamos aquí para ayudarte</p>
  </div>

  <div class="contacto-grid">

    <!-- FORM -->
    <div class="contacto-form-box">
      <h3>Envíanos un mensaje</h3>

      <form action="#" method="POST">
        <label>Nombre</label>
        <input type="text" name="nombre" required>

        <label>Correo</label>
        <input type="email" name="email" required>

        <label>Mensaje</label>
        <textarea name="mensaje" rows="4" required></textarea>

        <button type="submit">Enviar</button>
      </form>
    </div>

    <!-- MAPA -->
    <div class="contacto-mapa-box">
      <h3>Ubicación</h3>

      <div class="mapa-embed">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3512.6054810182063!2d-74.84906135641123!3d10.958208005822877!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8ef42daafd1e9e29%3A0xfd09015b89d10375!2sConjunto%20Residencial%20Arena%20Sotavento!5e0!3m2!1ses!2sco!4v1776167004042!5m2!1ses!2sco" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" width="100%" height="200"></iframe>
      </div>

      <div class="info-item"> Barranquilla , Colombia</div>
      <div class="info-item"> +57 300 2207262</div>
      <div class="info-item"> 8:00 am – 9:00 pm</div>
    </div>

  </div>

</section>
    
</body>
